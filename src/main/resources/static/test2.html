<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>WS Test</title>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; }
    input { width: 600px; margin-bottom: 10px; padding: 5px; }
    button { margin-right: 10px; padding: 6px 12px; }
  </style>
</head>
<body>

<h3>WebSocket 채팅 테스트</h3>

<div>
  <div>JWT 토큰 (Bearer 빼고 붙여넣기)</div>
  <input id="tokenInput" placeholder="여기에 JWT 붙여넣기" />
</div>

<div>
  <div>Room ID</div>
  <input id="roomIdInput" value="1" />
</div>

<br/>

<button onclick="connect()">연결</button>
<button onclick="sendMessage()">메시지 전송</button>

<pre id="log" style="margin-top:20px; border:1px solid #ccc; padding:10px; height:250px; overflow:auto;"></pre>

<script>
  let stompClient;

  function log(msg) {
    const logArea = document.getElementById("log");
    logArea.textContent += msg + "\n";
    logArea.scrollTop = logArea.scrollHeight;
  }

  function connect() {

    const token = document.getElementById("tokenInput").value.trim();
    const roomId = document.getElementById("roomIdInput").value.trim();

    if (!token) {
      log("❗ 토큰을 입력하세요.");
      return;
    }

    const socket = new SockJS(
      "http://localhost:8080/ws?token=" + encodeURIComponent(token)
    );

    stompClient = Stomp.over(socket);
    stompClient.debug = (msg) => log("[DEBUG] " + msg);

    stompClient.connect(
      {},
      function () {
        log("✅ CONNECT 성공");

        stompClient.subscribe("/topic/chat/room/" + roomId, message => {
          log("📩 받은 메시지: " + message.body);
        });
      },
      function (error) {
        log("❌ CONNECT 실패: " + JSON.stringify(error));
      }
    );
  }

  function sendMessage() {

    const roomId = Number(document.getElementById("roomIdInput").value.trim());

    if (!stompClient) {
      log("❗ 먼저 연결하세요.");
      return;
    }

    stompClient.send(
      "/app/chat/send",
      {},
      JSON.stringify({
        roomId: roomId,
        content: "테스트 메시지"
      })
    );

    log("➡️ 메시지 전송 완료");
  }
</script>

</body>
</html>
